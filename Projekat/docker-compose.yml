version: '3.8'

services:
  smartlib-db:
    image: mysql:8.0
    container_name: smartlib-db
    environment:
      MYSQL_DATABASE: smartlib
      MYSQL_USER: smartlib_user
      MYSQL_PASSWORD: smartlib_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 5

  smartlib-web:
    build:
      context: .
      dockerfile: src/SmartLib.Web/Dockerfile
    container_name: smartlib-web
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=smartlib-db;Port=3306;Database=smartlib;User=smartlib_user;Password=smartlib_pass
    ports:
      - "5000:8080"
    depends_on:
      smartlib-db:
        condition: service_healthy

  # Nginx reverse proxy (opciono, za produkciju)
  # nginx:
  #   image: nginx:alpine
  #   container_name: smartlib-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - smartlib-web

volumes:
  mysql_data:
