<!DOCTYPE html>
<html lang="bs" id="theme-root">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Email poslan — SmartLib</title>
<script>(function(){var t=localStorage.getItem('smartlib-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
<link rel="stylesheet" href="../assets/css/site.css" />
<link rel="stylesheet" href="../assets/css/animations.css" />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
.email-sent-card { max-width: 440px; margin: 4rem auto; text-align: center; padding: 2.5rem 2rem; animation: cardSlideIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
@keyframes cardSlideIn { from { opacity: 0; transform: translateY(24px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
.email-icon-wrapper { width: 80px; height: 80px; margin: 0 auto 1.5rem; border-radius: 50%; background: linear-gradient(135deg, #eef6ff, #dbeafe); display: flex; align-items: center; justify-content: center; animation: emailPulse 2s ease-in-out infinite; box-shadow: 0 8px 25px rgba(37, 99, 235, 0.12); }
@keyframes emailPulse { 0%, 100% { box-shadow: 0 8px 25px rgba(37, 99, 235, 0.12); transform: scale(1); } 50% { box-shadow: 0 12px 35px rgba(37, 99, 235, 0.22); transform: scale(1.04); } }
.email-sent-card h2 { margin: 0 0 0.75rem; font-size: 1.5rem; color: var(--sl-text, #1f2937); animation: fadeUp 0.5s 0.2s ease both; }
.email-sent-card .sent-msg { margin: 0 0 0.75rem; color: var(--sl-muted, #64748b); font-size: 0.95rem; line-height: 1.6; animation: fadeUp 0.5s 0.35s ease both; }
.email-sent-card .sent-hint { margin: 0 0 1.5rem; color: var(--sl-muted, #94a3b8); font-size: 0.84rem; line-height: 1.5; animation: fadeUp 0.5s 0.45s ease both; }
.email-sent-card .btn { animation: fadeUp 0.5s 0.55s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<nav id="main-nav" class="smartlib-navbar smartlib-navbar-app">
    <div class="smartlib-nav-inner">
        <div class="nav-brand"><a data-nav-href="index.html"><span class="brand-icon">📚</span><span class="brand-text">SmartLib</span></a></div>
        <ul class="nav-links" id="nav-menu">
            <li><a data-nav-href="vijest/index.html" class="menu-item">Vijesti</a></li>
            <li><a data-nav-href="kalendar/index.html" class="menu-item">Kalendar</a></li>
            <li class="menu-item"><button id="theme-toggle" class="theme-toggle-btn" aria-label="Promijeni temu">🌙</button></li>
        </ul>
    </div>
</nav>
<div class="page-shell">
<div class="card email-sent-card">
    <div class="email-icon-wrapper">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="22,4 12,13 2,4"/>
        </svg>
    </div>
    <h2>Provjerite svoj email</h2>
    <p class="sent-msg">Ako nalog sa tom email adresom postoji, poslali smo vam link za resetovanje lozinke.</p>
    <p class="sent-hint">Provjerite i <strong>spam/junk</strong> folder. Link je validan <strong>1 sat</strong>.</p>
    <a data-nav-href="auth/reset-password.html" class="btn btn-primary" style="width: 100%; margin-bottom:.6rem;">Nastavi na resetovanje (demo)</a>
    <a data-nav-href="auth/login.html" class="btn btn-secondary" style="width: 100%;">← Nazad na prijavu</a>
</div>
</div>
<footer><p>&copy; 2026 SmartLib — SI Grupa 5, ETF Sarajevo</p></footer>

</html>
