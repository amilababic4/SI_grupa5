<!DOCTYPE html>
<html lang="bs" id="theme-root">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zaboravljena lozinka — SmartLib</title>
<script>(function(){var t=localStorage.getItem('smartlib-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
<link rel="stylesheet" href="../assets/css/site.css" />
<link rel="stylesheet" href="../assets/css/animations.css" />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav id="main-nav" class="smartlib-navbar smartlib-navbar-app">
    <div class="smartlib-nav-inner">
        <div class="nav-brand"><a data-nav-href="index.html"><span class="brand-icon">📚</span><span class="brand-text">SmartLib</span></a></div>
        <ul class="nav-links" id="nav-menu">
            <li><a data-nav-href="vijest/index.html" class="menu-item">Vijesti</a></li>
            <li><a data-nav-href="kalendar/index.html" class="menu-item">Kalendar</a></li>
            <li class="menu-item"><button id="theme-toggle" class="theme-toggle-btn" aria-label="Promijeni temu">🌙</button></li>
        </ul>
    </div>
</nav>
<div class="page-shell">
<div class="card" style="max-width: 400px; margin: 4rem auto;">
    <h2>Zaboravljena lozinka</h2>
    <p style="margin-bottom: 1.5rem; color: var(--text-muted);">Unesite vašu email adresu kako bismo vam poslali link za resetovanje lozinke.</p>

    <form id="forgot-form">
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="vas@email.com" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Pošalji link za resetovanje</button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; border-top: 1px solid var(--sl-border); padding-top: 1rem;">
        <a data-nav-href="auth/login.html" style="font-size: 0.9rem; color: var(--sl-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: color 0.2s;" onmouseover="this.style.color='var(--sl-blue)'" onmouseout="this.style.color='var(--sl-muted)'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Nazad na prijavu
        </a>
    </div>
</div>
</div>
<footer><p>&copy; 2026 SmartLib — SI Grupa 5, ETF Sarajevo</p></footer>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/common.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/animations.js" defer></script>
<script src="../assets/js/pages/forgot-password.js"></script>
</body>
</html>
