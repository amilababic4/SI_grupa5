<!DOCTYPE html>
<html lang="bs" id="theme-root">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lozinka uspješno resetovana — SmartLib</title>
<script>(function(){var t=localStorage.getItem('smartlib-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
<link rel="stylesheet" href="../assets/css/site.css" />
<link rel="stylesheet" href="../assets/css/animations.css" />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
.reset-success-card { max-width: 440px; margin: 4rem auto; text-align: center; padding: 2.5rem 2rem; animation: cardPopIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
@keyframes cardPopIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
.success-icon-wrapper { width: 80px; height: 80px; margin: 0 auto 1.5rem; border-radius: 50%; background: linear-gradient(135deg, #ecfdf3, #d1fae5); display: flex; align-items: center; justify-content: center; animation: iconBounce 0.8s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both; box-shadow: 0 8px 25px rgba(2, 122, 72, 0.15); }
@keyframes iconBounce { from { opacity: 0; transform: scale(0); } 50% { transform: scale(1.15); } to { opacity: 1; transform: scale(1); } }
.success-checkmark { width: 40px; height: 40px; color: #027a48; }
.success-checkmark path { stroke-dasharray: 60; stroke-dashoffset: 60; animation: drawCheck 0.5s 0.7s ease forwards; }
@keyframes drawCheck { to { stroke-dashoffset: 0; } }
.reset-success-card h2 { margin: 0 0 0.75rem; font-size: 1.5rem; color: var(--sl-text, #1f2937); animation: fadeInUp 0.5s 0.5s ease both; }
.reset-success-card .success-msg { margin: 0 0 2rem; color: var(--sl-muted, #64748b); font-size: 0.95rem; line-height: 1.6; animation: fadeInUp 0.5s 0.65s ease both; }
.reset-success-card .btn { animation: fadeInUp 0.5s 0.8s ease both; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
.confetti { position: absolute; top: -10px; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall 3s ease-in forwards; opacity: 0; }
@keyframes confettiFall { 0% { opacity: 1; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(100vh) rotate(720deg); } }
</style>
</head>
<body>
<nav id="main-nav" class="smartlib-navbar smartlib-navbar-app">
    <div class="smartlib-nav-inner">
        <div class="nav-brand"><a data-nav-href="index.html"><span class="brand-icon">📚</span><span class="brand-text">SmartLib</span></a></div>
        <ul class="nav-links" id="nav-menu">
            <li><a data-nav-href="vijest/index.html" class="menu-item">Vijesti</a></li>
            <li><a data-nav-href="kalendar/index.html" class="menu-item">Kalendar</a></li>
            <li class="menu-item"><button id="theme-toggle" class="theme-toggle-btn" aria-label="Promijeni temu">🌙</button></li>
        </ul>
    </div>
</nav>
<div class="confetti-container" id="confetti"></div>
<div class="page-shell">
<div class="card reset-success-card">
    <div class="success-icon-wrapper">
        <svg class="success-checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 13l4 4L19 7" />
        </svg>
    </div>
    <h2>Lozinka uspješno promijenjena!</h2>
    <p class="success-msg">Vaša lozinka je uspješno resetovana. Sada se možete prijaviti sa novom lozinkom.</p>
    <a data-nav-href="auth/login.html" class="btn btn-primary" style="width: 100%;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Prijavi se
    </a>
</div>
</div>
<footer><p>&copy; 2026 SmartLib — SI Grupa 5, ETF Sarajevo</p></footer>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/common.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/animations.js" defer></script>
<script>
(function () {
    var container = document.getElementById('confetti');
    var colors = ['#027a48', '#2563eb', '#c8974a', '#7c3aed', '#06b6d4', '#ec4899'];
    for (var i = 0; i < 40; i++) {
        var el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + '%';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDelay = (Math.random() * 1.5) + 's';
        el.style.animationDuration = (2 + Math.random() * 2) + 's';
        el.style.width = (5 + Math.random() * 6) + 'px';
        el.style.height = (5 + Math.random() * 6) + 'px';
        container.appendChild(el);
    }
    setTimeout(function () { container.remove(); }, 5000);
})();
</script>
</body>
</html>
