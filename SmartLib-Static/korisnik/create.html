<!DOCTYPE html>
<html lang="bs" id="theme-root">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registracija — SmartLib</title>
<script>(function(){var t=localStorage.getItem('smartlib-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
<link rel="stylesheet" href="../assets/css/site.css" />
<link rel="stylesheet" href="../assets/css/animations.css" />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
.auth-shell { max-width: 460px; margin: 3rem auto; }
.auth-card { background: var(--sl-card-solid); border-radius: var(--sl-radius-lg); box-shadow: var(--sl-shadow); padding: 2.25rem; }
.auth-card h1 { font-size: 1.5rem; margin-bottom: .35rem; text-align: center; }
.auth-card .sub { text-align: center; color: var(--sl-muted); margin-bottom: 1.5rem; font-size: .92rem; }
.password-field { position: relative; }
.password-field input { width: 100%; padding-right: 2.5rem; }
.password-toggle { position: absolute; right: .6rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; }
.auth-links { text-align: center; margin-top: 1.25rem; font-size: .9rem; }
</style>
</head>
<body>
<nav id="main-nav" class="smartlib-navbar smartlib-navbar-app">
    <div class="smartlib-nav-inner">
        <div class="nav-brand"><a data-nav-href="index.html"><span class="brand-icon">📚</span><span class="brand-text">SmartLib</span></a></div>
        <ul class="nav-links" id="nav-menu">
            <li><a data-nav-href="vijest/index.html" class="menu-item">Vijesti</a></li>
            <li><a data-nav-href="kalendar/index.html" class="menu-item">Kalendar</a></li>
        </ul>
    </div>
</nav>
<main class="page-shell">
<div class="auth-shell">
    <div class="auth-card">
        <h1>Registracija</h1>
        <p class="sub">Kreirajte novi članski nalog</p>
        <div id="alert-container"></div>
        <form id="create-form">
            <div style="display:flex;gap:.75rem;">
                <div class="form-group" style="flex:1;"><label for="ime">Ime</label><input type="text" id="ime" required /></div>
                <div class="form-group" style="flex:1;"><label for="prezime">Prezime</label><input type="text" id="prezime" required /></div>
            </div>
            <div class="form-group"><label for="email">Email</label><input type="email" id="email" required /></div>
            <div class="form-group"><label for="password">Lozinka</label><div class="password-field"><input type="password" id="password" required minlength="6" /><button type="button" class="password-toggle">👁</button></div></div>
            <div class="form-group"><label for="confirm-password">Potvrdite lozinku</label><div class="password-field"><input type="password" id="confirm-password" required minlength="6" /><button type="button" class="password-toggle">👁</button></div></div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Registruj se</button>
        </form>
        <div class="auth-links"><a data-nav-href="auth/login.html">Već imate nalog? Prijavite se</a></div>
    </div>
</div>
</main>
<footer><p>&copy; 2026 SmartLib — SI Grupa 5, ETF Sarajevo</p></footer>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/common.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/animations.js" defer></script>
<script src="../assets/js/pages/korisnik-create.js"></script>
</body>
</html>
